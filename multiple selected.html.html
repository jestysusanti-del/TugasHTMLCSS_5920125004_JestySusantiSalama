<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="http://www.example.com/profile.php">
        <p>Do your play any of the following instruments?
            (Your can select more than one option by holding
            down control on a PC or command key on a Mac
            while selecting different option.)</p>
        <select name="instruments" size="4"
          multiple="multiple">
          <option value="guitar" selected="selected">
            Guitar</option>
          <option value="drums">Drums</option>
          <option value="keyboard">Keyboard</option>
          <option value="bass" selected="selected">
            Bass</option>
        </select>
    </form>
</body>
</html>
