<!DOCTYPE html>
<html lang="en">
<head>
    <title>Border Radius</title>
    <style>
        p {
          border: 5px solid #3ed381; 
          padding: 20px;
          width: 275px;
          text-align: center; 
          border-radius: 10px;
          -moz-border-radius: 10px;
          -webkit-border-radius: 10px;}
    </style>
</head>
<body>
    <p>Pet Sounds Featured a number of unconventional
        instruments such a becycle bell,buzzing 
        organs, harpsichords,flutes, Electro-Theremin,
        dog whistles, trains, Hawaiian-sounding string
        instruments, Coca-cola cans and barking dogs.
    </p>
</body>
</html>
