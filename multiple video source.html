<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Video Source</title>
</head>
<body>
    <video poster="images/puppy.jpg" width="400"
     height="320" preload controls loop>
     <source src="video/puppy.mp4" type='video/
       mp4;codecs="avcl.42E01E, mp4a.40.2"' />
    <source src="video/puppy.webm" type='video/
       webn;codecs="vp8, vorbis"' />
     <p>A video of a puppy playing in the snow</p></video>
</body>
</html>
