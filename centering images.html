<!DOCTYPE html>
<html lang="en">
<head>
    <title>Centering Images</title>
    <style>
        img.align-center {
            display: block;
            margin: 0px auto;}
        img.medium {
            width: 250px;
            height: 250px;}
    </style>
</head>
<body>
    <p><img src="magno.jpeg" 
       alt="Magnolia" class="align-center medium" />
      <b><i>Magnolia</i></b> is a large genus that contains over 200 flowering plant species. 
      It is name after French botanist Pierre Magnol and, having avolved before bees appeared,
      the flowers were developed to encourage pollination by beetle.</p>
</body>
</html>
